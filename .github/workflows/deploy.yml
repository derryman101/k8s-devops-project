name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add host to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.MASTER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Kubernetes
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.MASTER_IP }} "
            kubectl set image deployment/nginx-deployment \
            nginx=${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} &&
            kubectl rollout status deployment/nginx-deployment --timeout=120s
          "