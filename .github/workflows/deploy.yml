name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest


  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      # ✅ CRITICAL FIX: bring repo files to runner
      - name: Checkout code
        uses: actions/checkout@v3

      # Optional but recommended
      - name: Verify kubectl context
        run: kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yml
          kubectl apply -f service.yml

      - name: Restart rollout
        run: kubectl rollout restart deployment nginx-deployment

      - name: Verify rollout status
        run: kubectl rollout status deployment nginx-deployment --timeout=120s